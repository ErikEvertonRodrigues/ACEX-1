<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFBA Paulo Afonso | Video do Curso</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="curso_in.css">
    <script src="https://kit.fontawesome.com/898f59f198.js" crossorigin="anonymous"></script>
    <script src="../assets/js/script.js" defer></script>
    <script src="../assets/js/contato.js"></script>
    <link rel="stylesheet" href="../assets/css/contato.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="logo-container"><a href="../index.html"><img class="logo" src="../assets/imgs/cacto_e_nome_pretooo.svg" alt=""></a></div>

            <ul class="hamburguer-container hide" type="none">
                <li class="hamburguer"></li>
                <li class="hamburguer"></li>
                <li class="hamburguer"></li>
            </ul>

            <nav class="navigation">
                <ul type="none">
                    <li><a class="nav-link" href="../index.html">Inicio</a></li>
                    <li><a class="nav-link" href="#">Sobre o Curso</a></li>
                    <li><a class="nav-link" href="./cursos.html">Minicursos</a></li>
                    <li><a class="nav-link" href="../ebooks/ebooks.html">E-books</a></li>
                    <li><a class="nav-link" href="#">Contato</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <nav class="navigation-mob">
        <ul type="none">
            <li><a class="nav-link" href="../index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
            <li><a class="nav-link" href="#"><i class="fa-solid fa-circle-question"></i> Sobre o Curso</a></li>
            <li><a class="nav-link" href="../pagina cursos/cursos.html"><i class="fa-solid fa-play"></i> Minicursos</a></li>
            <li><a class="nav-link" href="../ebooks/ebooks.html"><i class="fa-solid fa-book"></i> E-books</a></li>
            <li><a class="nav-link" href="#"><i class="fa-solid fa-phone"></i> Contato</a></li>
        </ul>
    </nav>

    <main class="curso-layout">
    <aside class="sidebar">
        <div class="curso-info">
            <a href="cursos.html"><i class="fa-solid fa-arrow-left"></i> Voltar para minicursos</a>
            <div>
                <h2 id="curso-titulo-principal"></h2>
            </div>
        </div>

        <ul class="aulas" id="playlist-dinamica">
        </ul>
    </aside>

    <section class="conteudo">

        <div class="topbar">
            <button class="open-sidebar"><i class="fa-solid fa-bars"></i> Exibir aulas</button>
            <button id="btn-proxima-aula">Próxima Aula →</button>
        </div>

        <h1 id="titulo-aula"></h1>

        <div class="video-container">
            <iframe
                id="video-player"
                title="Video Aula"
                allowfullscreen>
            </iframe>
        </div>

        <article class="aula-conteudo" id="conteudo-aula">
        </article>
    <section class="contato"> 
        <div class="container"> 
            <div class="texto"> 
                <h2>Fique por dentro das novidades</h2> 
                <p>Receba lançamentos de novos e-books, minicursos e conteúdos exclusivos.</p> 
            </div> 

            <div class="dados"> 
                <form id="form"> 
                    <div class="grupo-inputs"> 
                        <input type="email" placeholder="📧 Seu melhor e-mail" name="email" id="email"> 
                        <input type="number" placeholder="📞 WhatsApp com DDD" name="telefone" id="telefone"> 
                    </div> <button type="submit"> Inscrever-se </button> 
                </form> 
            </div> 
        </div>
    </section>
</main>

    <script src="../assets/js/minicurso.js"></script>
    <script>
        const button = document.querySelector('.open-sidebar');
        const sidebar = document.querySelector('.sidebar');
        
        button.addEventListener('click', () => {
            event.stopPropagation();
            sidebar.classList.add('open');
            button.classList.add('hidden');
        });

        window.addEventListener('click', (event) => {

            if (
            !button.contains(event.target) &&
            !sidebar.contains(event.target)
        ) {
            sidebar.classList.remove('open');
            button.classList.remove('hidden');
        }
        });

    </script>
</body>

</html>
